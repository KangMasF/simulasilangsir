<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Twin - Stasiun Ketapang</title>
    <style>
        :root { --primary: #002d5e; --secondary: #f39c12; --danger: #e74c3c; --success: #27ae60; }
        body { font-family: sans-serif; background: #222; color: white; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* Container Utama dengan Gambar Emplasemen */
        .emplasemen-container {
            position: relative;
            width: 1200px; /* Lebar gambar */
            height: 600px; /* Tinggi gambar */
            margin: auto;
            background-image: url('emplasemenktg.png'); /* Link gambar asli kamu */
            background-size: contain;
            background-repeat: no-repeat;
            border: 2px solid #555;
            background-color: white;
        }

        /* Titik Interaktif (Jalur) */
        .track-slot {
            position: absolute;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--secondary);
            border-radius: 4px;
            padding: 5px;
            min-width: 120px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            z-index: 10;
        }

        /* Gerbong/Unit */
        .unit {
            background: #fff; color: #000; padding: 2px 5px;
            font-size: 10px; font-weight: bold; cursor: pointer;
            border-radius: 2px; text-align: center;
        }
        .unit.selected { background: var(--secondary); color: #fff; box-shadow: 0 0 10px var(--secondary); }

        /* Posisi Koordinat Jalur (Akan kita sesuaikan) */
        #slot-I { top: 195px; left: 550px; }
        #slot-II { top: 235px; left: 550px; }
        #slot-III { top: 285px; left: 550px; }
        #slot-IV { top: 335px; left: 550px; }
        #slot-V { top: 385px; left: 550px; }
        #slot-VI { top: 435px; left: 550px; }
        #slot-DIPO-KRT-1 { top: 35px; left: 140px; }
        #slot-DIPO-KRT-2 { top: 75px; left: 140px; }
        #slot-CUCI-1 { top: 115px; left: 140px; }
        #slot-CUCI-2 { top: 155px; left: 140px; }
        #slot-WESEL-BARAT { top: 480px; left: 100px; }

        /* UI Penunjang */
        .header { text-align: center; background: var(--primary); padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .btn-move { font-size: 9px; margin-top: 3px; cursor: pointer; background: var(--success); color: white; border: none; }
        #log { background: #000; color: #0f0; padding: 10px; font-family: monospace; height: 100px; overflow-y: auto; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="header">
    <strong>SIMULATOR TEMPLATE REALISTIS - STASIUN KETAPANG</strong> | 
    GERAKAN: <span id="moveCount">0</span> |
    <button onclick="location.reload()" style="background:var(--danger); color:white; border:none; padding:2px 10px; cursor:pointer;">Reset</button>
</div>

<div class="emplasemen-container" id="map">
    </div>

<div id="log">>>> Pilih unit di ujung jalur untuk memulai langsir...</div>

<script>
    const trackConfigs = {
        "I": { x: 550, y: 195, cap: 14, units: [] },
        "II": { x: 550, y: 235, cap: 15, units: [] },
        "III": { x: 550, y: 285, cap: 16, units: [] },
        "IV": { x: 550, y: 335, cap: 15, units: [] },
        "V": { x: 550, y: 385, cap: 15, units: [] },
        "VI": { x: 550, y: 435, cap: 17, units: ["M1 09401", "P 06802", "4 KRT"] },
        "DIPO KRT 1": { x: 140, y: 35, cap: 5, units: ["B 06604", "K3 09304"] },
        "DIPO KRT 2": { x: 140, y: 75, cap: 7, units: ["K1 08618", "K1 00229"] },
        "LEHER WESEL": { x: 50, y: 480, cap: 20, units: [] }
    };

    let selectedUnit = null;
    let fromTrack = null;
    let moveCount = 0;

    function render() {
        const map = document.getElementById('map');
        map.innerHTML = '';

        for (const [name, data] of Object.entries(trackConfigs)) {
            const slot = document.createElement('div');
            slot.className = 'track-slot';
            slot.style.left = data.x + 'px';
            slot.style.top = data.y + 'px';

            const label = `<div style="font-size:9px; border-bottom:1px solid #777; margin-bottom:3px">${name}</div>`;
            const units = data.units.map((u, i) => {
                const isSelected = (selectedUnit === u && fromTrack === name && i === data.units.length - 1);
                return `<div class="unit ${isSelected ? 'selected' : ''}" onclick="select('${name}', ${i})">${u}</div>`;
            }).join('');

            slot.innerHTML = `${label}${units}<button class="btn-move" onclick="move('${name}')">MASUK</button>`;
            map.appendChild(slot);
        }
        document.getElementById('moveCount').innerText = moveCount;
    }

    function select(track, idx) {
        if (idx !== trackConfigs[track].units.length - 1) return;
        selectedUnit = trackConfigs[track].units[idx];
        fromTrack = track;
        render();
    }

    function move(target) {
        if (!selectedUnit || target === fromTrack) return;
        trackConfigs[fromTrack].units.pop();
        trackConfigs[target].units.push(selectedUnit);
        moveCount++;
        addLog(`MOVE: ${selectedUnit} (${fromTrack} -> ${target})`);
        selectedUnit = null; fromTrack = null;
        render();
    }

    function addLog(m) {
        const l = document.getElementById('log');
        l.innerHTML += `<div>> ${m}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    render();
</script>
</body>
</html>
