<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Langsir KTG</title>
    <style>
        body { font-family: sans-serif; background: #333; color: white; display: flex; flex-direction: column; align-items: center; }
        .container { width: 95%; margin-top: 20px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        svg { width: 100%; height: auto; }
        
        /* Gaya Jalur */
        .track { fill: none; stroke: #2c3e50; stroke-width: 3; stroke-linecap: round; }
        .main-track { stroke-width: 5; stroke: #000; }
        .label-text { fill: #000; font-size: 12px; font-weight: bold; }
        .wesel-node { fill: red; stroke: white; stroke-width: 1; cursor: pointer; }
        .wesel-node:hover { fill: yellow; }

        /* Animasi sederhana untuk simulasi */
        .train-unit { fill: #e74c3c; stroke: #c0392b; stroke-width: 1; transition: all 0.5s ease; }
    </style>
</head>
<body>

    <h2>Simulasi Emplasemen Ketapang (KTG)</h2>
    
    <div class="container">
        <svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
            <text x="500" y="30" class="label-text" text-anchor="middle" font-size="20">EMPLASEMEN KETAPANG [cite: 19]</text>
            <line x1="500" y1="60" x2="500" y2="450" stroke="#ccc" stroke-dasharray="5,5" />

            <g id="jalur-stasiun">
                <line id="track-1" class="track main-track" x1="300" y1="180" x2="700" y2="180" />
                <text x="500" y="175" class="label-text">I</text>

                <line id="track-2" class="track main-track" x1="300" y1="210" x2="700" y2="210" />
                <text x="500" y="205" class="label-text">II</text>

                <line id="track-3" class="track main-track" x1="300" y1="240" x2="700" y2="240" />
                <text x="500" y="235" class="label-text">III</text>

                <line id="track-4" class="track" x1="300" y1="270" x2="700" y2="270" />
                <text x="500" y="265" class="label-text">IV </text>

                <line id="track-5" class="track" x1="300" y1="300" x2="700" y2="300" />
                <text x="500" y="295" class="label-text">V </text>

                <line id="track-6" class="track" x1="300" y1="330" x2="700" y2="330" />
                <text x="500" y="325" class="label-text">VI </text>
            </g>

            <g id="fasilitas-kiri">
                <path class="track" d="M 50 80 L 250 80" id="dipo-1" />
                <text x="60" y="75" class="label-text" font-size="10">JALUR DIPO KERETA 1 [cite: 5]</text>
                
                <path class="track" d="M 50 110 L 250 110" id="cuci-1" />
                <text x="60" y="105" class="label-text" font-size="10">JALUR CUCI 1 [cite: 12, 33]</text>

                <path class="track" d="M 50 400 Q 150 400 280 330" id="jalur-putar" />
                <text x="60" y="395" class="label-text">JALUR PUTAR </text>
            </g>

            <g id="fasilitas-kanan">
                <path class="track" d="M 700 180 L 850 120" id="jalur-bongkar" />
                <text x="750" y="135" class="label-text">JALUR BONGKAR [cite: 33, 38]</text>

                <path class="track" d="M 700 330 Q 750 330 850 240" />
                <path class="track main-track" d="M 850 240 L 980 300" id="ke-jember" />
                <text x="900" y="320" class="label-text" transform="rotate(25 900,320)">KE JEMBER </text>
            </g>

            <circle class="wesel-node" cx="280" cy="180" r="4" id="W11A" />
            <circle class="wesel-node" cx="720" cy="180" r="4" id="W4" />
            
            <rect id="loco" class="train-unit" x="310" y="205" width="40" height="10" rx="2" />
        </svg>
    </div>

    <div style="margin-top: 20px;">
        <button onclick="moveLoco()">Tes Gerak (Langsir)</button>
        <p><small>Gunakan data Kapasitas Jalur  untuk validasi panjang rangkaian.</small></p>
    </div>

    <script>
        function moveLoco() {
            const loco = document.getElementById('loco');
            // Simulasi gerak ke Jalur I (y=175)
            loco.setAttribute('x', '600');
            loco.setAttribute('y', '175');
            alert('Lokomotif berpindah posisi untuk langsir!');
        }
    </script>

</body>
</html>
