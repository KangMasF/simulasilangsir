<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Twin - Stasiun Ketapang</title>
    <style>
        :root { --primary: #002d5e; --secondary: #f39c12; --danger: #e74c3c; --success: #27ae60; }
        body { font-family: sans-serif; background: #222; color: white; margin: 0; padding: 10px; }
        
        .header { text-align: center; background: var(--primary); padding: 10px; border-radius: 5px; margin-bottom: 10px; }

        /* Container Emplasemen */
        .emplasemen-container {
            position: relative;
            width: 1200px; 
            height: 600px; 
            margin: auto;
            background-image: url('denah.png'); /* Pastikan file sudah di-upload ke GitHub ok*/
            background-size: contain;
            background-repeat: no-repeat;
            background-color: white;
            border: 2px solid #555;
        }

        /* Slot Jalur Interaktif */
        .track-slot {
            position: absolute;
            background: rgba(0, 0, 0, 0.7); /* Transparan gelap agar gambar asli tetap terlihat sedikit */
            border: 1px solid var(--secondary);
            border-radius: 4px;
            padding: 4px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            z-index: 10;
        }

        .unit {
            background: #fff; color: #000; padding: 2px 5px;
            font-size: 10px; font-weight: bold; cursor: pointer;
            border-radius: 2px; text-align: center;
        }
        .unit.selected { background: var(--secondary); color: #fff; }

        .btn-move { font-size: 9px; margin-top: 3px; cursor: pointer; background: var(--success); color: white; border: none; padding: 4px; font-weight: bold; }
        
        #log { background: #000; color: #0f0; padding: 10px; font-family: monospace; height: 100px; overflow-y: auto; margin-top: 10px; font-size: 12px; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="header">
    <strong>SIMULATOR TEMPLATE REALISTIS - STASIUN KETAPANG</strong> | 
    GERAKAN: <span id="moveCount">0</span> |
    <button onclick="location.reload()" style="background:var(--danger); color:white; border:none; padding:2px 10px; cursor:pointer;">Reset</button>
</div>

<div class="emplasemen-container" id="map"></div>

<div id="log">>>> Atur koordinat X, Y, dan W (Lebar) agar pas dengan jalur di gambar...</div>

<script>
    /* TIPS ATUR LAYOUT:
       x = geser kiri/kanan
       y = geser atas/bawah
       w = atur panjang/lebar kotak jalur
    */
    const trackConfigs = {
        "I":   { x: 457, y: 195, w: 150, cap: 14, units: [] },
        "II":  { x: 457, y: 235, w: 150, cap: 15, units: [] },
        "III": { x: 457, y: 285, w: 150, cap: 16, units: [] },
        "IV":  { x: 457, y: 335, w: 150, cap: 15, units: [] },
        "V":   { x: 457, y: 385, w: 150, cap: 15, units: [] },
        "VI":  { x: 457, y: 435, w: 150, cap: 17, units: ["M1 09401", "P 06802", "4 KRT"] },
        
        "DIPO KRT 1": { x: 125, y: 35, w: 130, cap: 5, units: ["B 06604", "K3 09304"] },
        "DIPO KRT 2": { x: 125, y: 85, w: 130, cap: 7, units: ["K1 08618", "K1 00229"] },
        
        "CUCI 1": { x: 125, y: 135, w: 130, cap: 11, units: [] },
        "LEHER WESEL": { x: 50, y: 520, w: 110, cap: 20, units: [] }
    };

    let selectedUnit = null;
    let fromTrack = null;
    let moveCount = 0;

    function render() {
        const map = document.getElementById('map');
        map.innerHTML = '';

        for (const [name, data] of Object.entries(trackConfigs)) {
            const slot = document.createElement('div');
            slot.className = 'track-slot';
            slot.style.left = data.x + 'px';
            slot.style.top = data.y + 'px';
            slot.style.width = data.w + 'px'; // MENGATUR PANJANG KOTAK

            const label = `<div style="font-size:9px; border-bottom:1px solid #777; margin-bottom:3px; text-align:center">${name}</div>`;
            const units = data.units.map((u, i) => {
                const isSelected = (selectedUnit === u && fromTrack === name && i === data.units.length - 1);
                return `<div class="unit ${isSelected ? 'selected' : ''}" onclick="select('${name}', ${i})">${u}</div>`;
            }).join('');

            slot.innerHTML = `${label}${units}<button class="btn-move" onclick="move('${name}')">MASUK</button>`;
            map.appendChild(slot);
        }
        document.getElementById('moveCount').innerText = moveCount;
    }

    function select(track, idx) {
        if (idx !== trackConfigs[track].units.length - 1) return;
        selectedUnit = trackConfigs[track].units[idx];
        fromTrack = track;
        render();
    }

    function move(target) {
        if (!selectedUnit || target === fromTrack) return;
        if (trackConfigs[target].units.length >= trackConfigs[target].cap) {
            alert("Jalur Penuh!"); return;
        }
        trackConfigs[fromTrack].units.pop();
        trackConfigs[target].units.push(selectedUnit);
        moveCount++;
        addLog(`MOVE: ${selectedUnit} (${fromTrack} -> ${target})`);
        selectedUnit = null; fromTrack = null;
        render();
    }

    function addLog(m) {
        const l = document.getElementById('log');
        l.innerHTML += `<div>> ${m}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    render();
</script>
</body>
</html>
