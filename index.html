<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulasi Langsir Ketapang v8</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&family=Orbitron:wght@700&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
<style>

/* ============================================================
   🎨🎨🎨  ZONA KUSTOMISASI VISUAL  🎨🎨🎨
   ============================================================
   Semua yang ada di bagian :root ini bisa kamu ubah sesuka hati.
   Cukup ganti nilai setelah tanda titik dua (:) lalu simpan file.
   ============================================================ */
:root {

    /* ┌─────────────────────────────────────────────────────┐
       │  🖼️  WARNA UTAMA APLIKASI                           │
       │  Ini adalah palet warna dasar seluruh tampilan      │
       └─────────────────────────────────────────────────────┘ */
    --warna-header-bg:    #002244;   /* latar belakang header / bar atas */
    --warna-header-garis: #f5a623;   /* garis bawah header (juga aksen utama) */
    --warna-aksen:        #f5a623;   /* warna aksen / highlight (judul, border popup) */
    --warna-bahaya:       #d0021b;   /* warna tombol RESET dan pesan error */
    --warna-sukses:       #27ae60;   /* warna tombol SIMPAN dan pesan sukses */
    --warna-info:         #5dade2;   /* warna pesan info di log */
    --warna-teks:         #dce8f5;   /* warna teks umum */
    --warna-border:       #1e3a5f;   /* warna garis pemisah dan border umum */

    /* ┌─────────────────────────────────────────────────────┐
       │  🌑  WARNA LATAR BELAKANG                           │
       └─────────────────────────────────────────────────────┘ */
    --warna-bg-halaman:   #111820;   /* latar belakang halaman utama */
    --warna-bg-popup:     #0d1e35;   /* latar belakang kotak popup */
    --warna-bg-infobar:   #07101c;   /* latar belakang info bar bawah header */
    --warna-bg-log:       #04080f;   /* latar belakang kotak log aktivitas */
    --warna-bg-input:     #07101c;   /* latar belakang kotak input/select */

    /* ┌─────────────────────────────────────────────────────┐
       │  🚃  WARNA CHIP SARANA (kotak kecil di jalur)       │
       └─────────────────────────────────────────────────────┘ */
    --warna-chip-bg:      black;  /* latar chip sarana biasa */
    --warna-chip-teks:    white;                 /* teks chip sarana biasa */
    --warna-loko-bg:     red;                 /* latar chip lokomotif */
    --warna-loko-teks:    white;                 /* teks chip lokomotif */
    --warna-chip-pilih:   #e07b10;                 /* warna chip saat dipilih/selected */

    /* ┌─────────────────────────────────────────────────────┐
       │  🔤  FONT (jenis huruf)                             │
       │  Opsi font dari Google: 'Roboto Condensed',         │
       │  'Oswald', 'Barlow Condensed', 'Orbitron'           │
       └─────────────────────────────────────────────────────┘ */
    --font-sans:  'Arial Narrow', Arial Narrow, Arial Narrow, Arial Narrow;
    --font-mono:  'Arial Narrow', 'Arial Narrow', monospace;
    --font-judul: 'Roboto Condensed', sans-serif;  /* font judul di header */

    /* ┌─────────────────────────────────────────────────────┐
       │  📏  UKURAN FONT                                    │
       └─────────────────────────────────────────────────────┘ */
    --ukuran-judul-header: 15px;   /* judul "SIMULATOR LANGSIR KETAPANG" */
    --ukuran-nama-jalur:   0px;    /* nama jalur di atas setiap slot */
    --ukuran-chip:         8px;    /* teks di dalam chip sarana */
    --ukuran-log:          10px;   /* teks di kotak log aktivitas */

    /* ┌─────────────────────────────────────────────────────┐
       │  🔲  TAMPILAN SLOT JALUR                            │
       └─────────────────────────────────────────────────────┘ */
    --warna-nama-jalur:    #90caff;             /* warna teks nama jalur di slot */
    --slot-blur:           blur(0px);            /* blur slot (ganti blur(0px) untuk hilangkan blur) */
    --slot-border-radius:  2px;                 /* sudut membulat slot */
    --chip-border-radius:  2px;                 /* sudut membulat chip sarana */

    /* ┌─────────────────────────────────────────────────────┐
       │  🗺️  UKURAN PETA / DENAH                           │
       └─────────────────────────────────────────────────────┘ */
    --peta-lebar:   1440px;   /* lebar total area peta */
    --peta-tinggi:  480px;    /* tinggi total area peta */
    --peta-bg:      #ffffff;  /* warna background peta (jika tanpa gambar) */

}
/* ============================================================
   🎨🎨🎨  AKHIR ZONA KUSTOMISASI VISUAL  🎨🎨🎨
   ============================================================
   Kode di bawah ini adalah logika tampilan.
   Tidak perlu diubah kecuali kamu sudah paham CSS.
   ============================================================ */

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--warna-bg-halaman); color: var(--warna-teks); padding: 8px; min-height: 100vh; }

/* ── HEADER ── */
.header {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    background: var(--warna-header-bg); border-bottom: 3px solid var(--warna-header-garis);
    padding: 6px 12px; border-radius: 4px 4px 0 0;
}
/* ✏️ Ganti font judul: ubah --font-judul di atas */
.header-title { font-size: var(--ukuran-judul-header); font-weight: 700; letter-spacing: 1.5px; color: #fff; flex: 1; font-family: var(--font-judul); }
.header-title span { color: var(--warna-aksen); }
.hdr-stat { display: flex; flex-direction: column; align-items: center; min-width: 44px; }
.hdr-stat-val { font-size: 20px; font-weight: 700; line-height: 1; color: var(--warna-aksen); font-family: var(--font-mono); }
.hdr-stat-lbl { font-size: 9px; color: #7a9cc0; letter-spacing: 1px; text-transform: uppercase; }
.hdr-divider  { width: 1px; height: 34px; background: var(--warna-border); margin: 0 2px; }
.hdr-btn {
    font-family: var(--font-sans); font-size: 11px; font-weight: 700;
    border: none; padding: 4px 10px; cursor: pointer; border-radius: 3px;
    transition: opacity .15s, background .15s; white-space: nowrap;
}
.hdr-btn:hover { opacity: .82; }
.btn-layout { background: #5a3a00; color: #f5a623; }
.btn-layout.active { background: #f5a623; color: #000; }
.btn-snap   { background: #2a2a2a; color: #aaa; }
.btn-snap.active { background: #1a5a3a; color: #2ecc71; }
.btn-save   { background: var(--warna-sukses); color: #fff; }
.btn-load   { background: #17568a; color: #fff; }
.btn-export { background: #444; color: #fff; }
.btn-reset  { background: var(--warna-bahaya); color: #fff; }
.btn-reset-count { background: #4a2800; color: #f5a623; border: 1px solid #8a4800; }
.btn-reset-count:hover { background: #6a3800 !important; }
.btn-ctx-toggle { background: #1a3a5a; color: #5dade2; }
.btn-ctx-toggle.ctx-off { background: #2a1a1a; color: #e74c3c; text-decoration: line-through; }
.btn-lepas-drag { background: #1a3a2a; color: #2ecc71; }
.btn-lepas-drag:hover { background: #2ecc71; color: #0a1a0a; }

/* ── UNDO / REDO ── */
.hdr-undo-wrap { display: flex; gap: 3px; align-items: center; }
.btn-undo {
    /* ✏️ Ganti ukuran: ubah angka width/height */
    font-size: 14px; background: none; border: 1px solid var(--warna-border);
    color: #7a9cc0; border-radius: 3px; width: 26px; height: 26px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .12s, color .12s; line-height: 1; padding: 0;
}
.btn-undo:hover:not(:disabled) { background: #1a3050; color: #fff; }
.btn-undo:disabled { opacity: .25; cursor: default; }
.btn-undo.can-act { color: var(--warna-aksen); border-color: var(--warna-aksen); }

/* ── INFO BAR ── */
.info-bar {
    background: var(--warna-bg-infobar); border: 1px solid var(--warna-border); border-top: none;
    padding: 3px 12px; font-family: var(--font-mono); font-size: 10px; color: #5a8ab0;
    display: flex; justify-content: space-between; margin-bottom: 5px;
}
.info-bar .hint { color: var(--warna-aksen); font-weight: 700; }
#layoutLabel { color: #f5a623; font-weight: 700; display: none; }

/* ── MAP / PETA ── */
/* ✏️ Ganti lebar & tinggi peta: ubah --peta-lebar / --peta-tinggi di atas */
.map-wrapper { border: 1px solid var(--warna-border); border-radius: 0 0 3px 3px; overflow-x: auto; background: #fff; line-height: 0; }
.emplasemen-container {
    position: relative;
    width: var(--peta-lebar); height: var(--peta-tinggi);
    background-image: url('denah.png');
    background-size: contain;
    background-position: center center;
    background-repeat: no-repeat;
    background-color: var(--peta-bg);  /* ✏️ ganti warna background peta */
    border: 3px solid #555;
    border-radius: 8px;
    user-select: none;
    margin: 0 auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* ── TRACK SLOT (kotak di atas peta) ── */
/* ✏️ Ganti --slot-bg di atas untuk ubah transparansi & warna slot */
.track-slot {
    position: absolute;
    background: var(--slot-bg);
    border: 0px solid rgba(100,160,220,0.35);
    border-radius: var(--slot-border-radius);
    padding: 0px;
    z-index: 10; backdrop-filter: var(--slot-blur);
}
body.layout-mode .track-slot { border: 1px solid rgba(245,166,35,0.7) !important; cursor: grab; }
body.layout-mode .track-slot:active { cursor: grabbing; }
body.layout-mode .track-slot .slot-drag-handle { display: flex; }
.slot-drag-handle {
    display: none; align-items: center; justify-content: center;
    color: var(--warna-aksen); font-size: 10px;
    cursor: grab; padding: 0 2px; flex-shrink: 0; line-height: 1;
}

/* ── HEADER SLOT ── */
.slot-header { display: flex; align-items: center; gap: 0px; flex-wrap: nowrap; margin-bottom: 0px; }
/* ✏️ Ganti --ukuran-nama-jalur dan warna #90caff untuk nama jalur */
.slot-name { font-family: var(--font-sans); font-size: var(--ukuran-nama-jalur); font-weight: 700; color: var(--warna-nama-jalur); white-space: nowrap; letter-spacing: .2px; flex-shrink: 0; }
.slot-count-badge { font-family: var(--font-mono); font-size: 8px; font-weight: 700; color: rgba(140,200,255,0.75); white-space: nowrap; flex-shrink: 0; margin-left: 4px; letter-spacing: .3px; }
.move-btns-inline { display: flex; gap: 2px; flex-wrap: nowrap; flex: 1; }
/* ✏️ Ganti warna tombol → SINI: ubah background & color di sini */
.btn-move {
    font-family: var(--font-sans); font-size: 8px; font-weight: 700;
    background: #0d4a28; color: #2ecc71;
    border: 1px solid #1a6a35; padding: 1px 4px;
    border-radius: 2px; cursor: pointer; transition: background .1s; white-space: nowrap; flex-shrink: 0;
}
.btn-move:hover { background: #1a6035; }
/* ✏️ Warna teks kapasitas jalur (angka X/Y) */
.slot-cap { font-family: var(--font-mono); font-size: 8px; color: rgba(100,160,220,0.5); flex-shrink: 0; }
/* ✏️ Tombol + tambah sarana: ganti warna background & color */
.btn-add-unit {
    font-size: 11px; font-weight: 700; line-height: 1;
    background: #0a3d1f; color: #2ecc71;
    border: 1px solid #1a7040; border-radius: 2px;
    width: 14px; height: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .1s;
}
.btn-add-unit:hover { background: #1a6035; }

/* ── UNIT ROW (baris chip sarana) ── */
/* ✏️ Ganti gap: angka gap antar chip / min-height tinggi minimum baris */
.unit-row { display: flex; flex-direction: row; gap: 1px; min-height: 12px; flex-wrap: nowrap; }

/* ── UNIT CHIP ── */
/* ✏️ Untuk ubah tampilan kotak sarana: ubah padding, font-size, border-radius */
.unit {
    font-family: var(--font-mono);
    background: var(--warna-chip-bg); color: var(--warna-chip-teks);
    padding: 1px 1px; font-size: var(--ukuran-chip); font-weight: 700;
    cursor: pointer; border-radius: var(--chip-border-radius);
    border: 0px solid rgba(136,168,200,0.7);
    white-space: nowrap; flex-shrink: 0; position: relative;
    transition: box-shadow .08s; display: flex; align-items: center; gap: 2px;
}
.unit:hover { box-shadow: 0 1px 5px rgba(0,0,0,.6); }
/* ✏️ Chip LOKOMOTIF: ganti --warna-loko-bg & --warna-loko-teks */
.unit.loco { background: var(--warna-loko-bg); color: var(--warna-loko-teks); border: 1px solid #0f4a7a; }
.unit.loco .loco-arrow { font-size: 8px; }
.unit.facing-east .loco-arrow::before { content: '▶'; }
.unit.facing-west .loco-arrow::before { content: '◀'; }
/* ✏️ Chip TERPILIH: ganti --warna-chip-pilih di atas */
.unit.selected { background: var(--warna-chip-pilih) !important; color: #fff !important; border: 1px solid #a05000 !important; box-shadow: 0 0 5px rgba(224,123,16,.8); }

/* ── WARNA TANDAI SARANA ── */
/* ✏️ Ingin ubah warna tandai? Ganti nilai rgba di bawah ini */
.unit[data-color="merah"]  { background: rgba(220,60,60,0.88)   !important; color:#fff !important; }
.unit[data-color="hijau"]  { background: rgba(34,139,34,0.90)   !important; color:#fff !important; }
.unit[data-color="biru"]   { background: rgba(30,100,200,0.90)  !important; color:#fff !important; }
.unit[data-color="kuning"] { background: rgba(210,170,0,0.92)   !important; color:#000 !important; }
.unit[data-color="oranye"] { background: rgba(220,100,0,0.92)   !important; color:#fff !important; }
.unit[data-color="ungu"]   { background: rgba(130,50,180,0.92)  !important; color:#fff !important; }
.unit[data-color="abu"]    { background: rgba(100,110,120,0.88) !important; color:#fff !important; }
.unit[data-color="pink"]   { background: rgba(210,80,150,0.90)  !important; color:#fff !important; }
.unit.selected[data-color] { filter: brightness(1.25) saturate(1.3); }

/* ── DIR HINT (petunjuk arah lok) ── */
/* ✏️ Ubah warna teks keterangan arah lokomotif */
.dir-hint { font-family: var(--font-mono); font-size: 7px; color: rgba(80,160,220,0.55); text-align: right; }

/* ── LOG AKTIVITAS ── */
/* ✏️ Ganti height: angka untuk ubah tinggi kotak log */
.log-wrap {
    margin-top: 6px; background: var(--warna-bg-log);
    border: 1px solid var(--warna-border); border-left: 3px solid var(--warna-aksen);
    border-radius: 2px; padding: 5px 10px;
    height: 110px; overflow-y: auto; font-family: var(--font-mono); font-size: var(--ukuran-log);
}
.log-entry { padding: 1px 0; border-bottom: 1px solid rgba(30,58,95,.2); }
.log-ok   { color: #2ecc71; }  /* ✏️ warna log gerakan berhasil */
.log-err  { color: #e74c3c; }  /* ✏️ warna log error/gagal */
.log-info { color: var(--warna-info); }  /* ✏️ warna log info */
.log-edit { color: var(--warna-aksen); } /* ✏️ warna log edit/perubahan */

/* ── CONTEXT MENU (klik kanan) ── */
.ctx-menu {
    position: fixed; z-index: 300;
    background: var(--warna-bg-popup); border: 1px solid var(--warna-aksen);
    border-radius: 3px; padding: 4px 0;
    box-shadow: 0 4px 16px rgba(0,0,0,.7); min-width: 175px;
}
.ctx-item { padding: 5px 14px; font-size: 11px; cursor: pointer; color: var(--warna-teks); font-family: var(--font-sans); font-weight: 700; }
.ctx-item:hover { background: #1a3050; color: #fff; }
.ctx-item.danger { color: var(--warna-bahaya); }
.ctx-item.danger:hover { background: #3a0010; }
.ctx-sep { height: 1px; background: var(--warna-border); margin: 3px 0; }
.ctx-color-row { display: flex; gap: 5px; padding: 5px 14px; align-items: center; flex-wrap: wrap; }
.ctx-color-swatch { width: 18px; height: 18px; border-radius: 3px; cursor: pointer; border: 2px solid transparent; transition: transform .1s, border-color .1s; flex-shrink: 0; }
.ctx-color-swatch:hover { transform: scale(1.25); border-color: #fff; }
.ctx-color-swatch.active { border-color: #fff; transform: scale(1.2); }
.ctx-color-clear { font-size: 9px; font-family: var(--font-sans); font-weight: 700; background: #1a1a2a; border: 1px solid #444; color: #aaa; border-radius: 2px; padding: 1px 4px; cursor: pointer; white-space: nowrap; }
.ctx-color-clear:hover { background: #2a2a3a; color: #fff; }

/* ── OVERLAY & POPUP ── */
/* ✏️ background: rgba(0,0,0,X) → X = 0.0 (transparan) sampai 1.0 (hitam penuh) */
#popOverlay { display:none; position:fixed; inset:0; z-index:199; background: rgba(0,0,0,0.45); }

/* ── POPUP BASE ── */
/* ✏️ Ganti warna, ukuran, dan border-radius popup di sini */
.popup-base {
    position: fixed; z-index: 200;
    background: var(--warna-bg-popup); border: 1px solid var(--warna-aksen);
    border-radius: 6px; padding: 0; width: 300px;
    box-shadow: 0 8px 32px rgba(0,0,0,.9);
    /* Posisi default: tengah layar — tidak bisa di-override langsung dari showPopup */
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    max-height: 90vh; overflow-y: auto;
    /* Agar bisa di-drag */
    user-select: none;
}
/* Handle drag di bagian atas popup */
.popup-drag-handle {
    background: linear-gradient(135deg, #0a1e38, #162d4a);
    border-bottom: 1px solid var(--warna-border);
    border-radius: 6px 6px 0 0;
    padding: 8px 12px;
    cursor: move;
    display: flex; align-items: center; justify-content: space-between;
}
.popup-drag-handle h4 { font-size: 11px; font-weight: 700; color: var(--warna-aksen); letter-spacing: .5px; margin: 0; }
.popup-drag-handle .popup-close {
    background: none; border: none; color: #5a8ab0; font-size: 16px;
    cursor: pointer; padding: 0 2px; line-height: 1;
}
.popup-drag-handle .popup-close:hover { color: #fff; }
.popup-body { padding: 10px; }

.popup-base label { font-size: 10px; color: #aac0d8; display: block; margin-bottom: 2px; }
.popup-base select, .popup-base input[type=text], .popup-base input[type=number] {
    font-family: var(--font-mono); font-size: 11px;
    background: var(--warna-bg-input); color: var(--warna-teks);
    border: 1px solid var(--warna-border); border-radius: 2px;
    padding: 3px 6px; width: 100%; margin-bottom: 6px;
}
.popup-base input[type=number] { width: 70px; }
.preview-box {
    font-family: var(--font-mono); font-size: 11px; font-weight: 700;
    background: #1a3050; color: #fff; text-align: center;
    padding: 4px; border-radius: 2px; margin-bottom: 7px;
    max-height: 80px; overflow-y: auto; line-height: 1.6;
    letter-spacing: .3px; white-space: pre-wrap; word-break: break-all;
}
.popup-row { display: flex; gap: 6px; align-items: flex-end; margin-bottom: 6px; }
.popup-row label { margin-bottom: 0; }
.popup-btns { display: flex; gap: 5px; margin-top: 8px; }
.popup-btns button { flex: 1; font-family: var(--font-sans); font-size: 11px; font-weight: 700; border: none; padding: 6px; border-radius: 3px; cursor: pointer; }
.btn-popup-ok  { background: var(--warna-sukses); color: #fff; }
.btn-popup-ok:hover  { background: #1e9050; }
.btn-popup-cancel { background: #333; color: #ccc; }
.btn-popup-cancel:hover { background: #444; }

.edit-list { max-height: 180px; overflow-y: auto; margin-bottom: 7px; }
.edit-item { display: flex; gap: 4px; align-items: center; margin-bottom: 3px; }
.edit-item input { font-family: var(--font-mono); font-size: 10px; background: var(--warna-bg-input); color: var(--warna-teks); border: 1px solid var(--warna-border); border-radius: 2px; padding: 2px 5px; flex: 1; }
.edit-item .chip-num { font-size: 9px; color: #5a8ab0; min-width: 16px; text-align: right; flex-shrink: 0; }
.edit-item.is-loco input { border-color: var(--warna-loko-bg); color: #5dade2; }

/* ── POPUP TAB ── */
.popup-tabs { display: flex; gap: 0; margin-bottom: 8px; border-radius: 3px; overflow: hidden; border: 1px solid var(--warna-border); }
.popup-tab { flex: 1; font-family: var(--font-sans); font-size: 11px; font-weight: 700; background: var(--warna-bg-input); color: #5a8ab0; border: none; padding: 5px 4px; cursor: pointer; transition: background .12s, color .12s; }
.popup-tab.active { background: var(--warna-header-bg); color: var(--warna-aksen); }
.popup-tab-panel { display: none; }
.popup-tab-panel.active { display: block; }

.dir-selector { display: flex; gap: 0; border: 1px solid var(--warna-border); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
.dir-btn { flex: 1; font-family: var(--font-sans); font-size: 10px; font-weight: 700; background: var(--warna-bg-input); color: #5a8ab0; border: none; padding: 4px 6px; cursor: pointer; transition: background .12s, color .12s; text-align: center; }
.dir-btn.active { background: #0d3a20; color: #2ecc71; }

.paste-area { font-family: var(--font-mono); font-size: 10px; background: var(--warna-bg-input); color: var(--warna-teks); border: 1px solid var(--warna-border); border-radius: 2px; padding: 5px 7px; width: 100%; height: 110px; resize: vertical; margin-bottom: 5px; outline: none; }
.paste-area:focus { border-color: var(--warna-aksen); }
.paste-parsed { font-family: var(--font-mono); font-size: 10px; font-weight: 700; background: #1a3050; color: #fff; padding: 4px 6px; border-radius: 2px; margin-bottom: 6px; max-height: 90px; overflow-y: auto; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
.paste-hint { font-size: 9px; color: #5a8ab0; margin-bottom: 5px; line-height: 1.5; }

#importFile { display: none; }

/* ── TOMBOL KUSTOM ── */
.btn-kustom { background: #2a0a4a; color: #c084fc; }
.btn-kustom.active { background: #7c3aed; color: #fff; }

/* ── PANEL KUSTOMISASI VISUAL ── */
#kustomPanel {
    display: none;
    background: #080f1c;
    border: 1px solid #7c3aed;
    border-top: 3px solid #c084fc;
    border-radius: 0 0 6px 6px;
    padding: 12px 16px 10px;
    margin-bottom: 5px;
    font-family: var(--font-sans);
}
#kustomPanel.open { display: block; }

.kustom-title {
    font-size: 11px; font-weight: 700; color: #c084fc;
    letter-spacing: 1px; margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between;
}
.kustom-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px 20px;
}
.kustom-row {
    display: flex; align-items: center; gap: 8px;
}
.kustom-row label {
    font-size: 10px; color: #9ab0cc; flex: 1; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
}
.kustom-row input[type=color] {
    width: 32px; height: 22px; border: 1px solid #3a2a5a;
    border-radius: 3px; cursor: pointer; padding: 1px 2px;
    background: #0a0f1c; flex-shrink: 0;
}
.kustom-row input[type=range] {
    width: 80px; accent-color: #7c3aed; flex-shrink: 0;
}
.kustom-row input[type=number] {
    width: 56px; font-family: var(--font-mono); font-size: 10px;
    background: #0a0f1c; color: #dce8f5;
    border: 1px solid #3a2a5a; border-radius: 2px;
    padding: 2px 4px; flex-shrink: 0;
}
.kustom-row select {
    font-size: 10px; font-family: var(--font-sans);
    background: #0a0f1c; color: #dce8f5;
    border: 1px solid #3a2a5a; border-radius: 2px;
    padding: 2px 4px; flex: 1;
}
.kustom-val {
    font-size: 9px; color: #7a6a9a; min-width: 28px;
    font-family: var(--font-mono); text-align: right; flex-shrink: 0;
}
.kustom-section {
    font-size: 9px; font-weight: 700; color: #7c3aed;
    letter-spacing: 1.5px; text-transform: uppercase;
    margin: 10px 0 6px; grid-column: 1/-1;
    border-bottom: 1px solid #2a1a4a; padding-bottom: 3px;
}
.kustom-actions {
    display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
}
.kustom-btn {
    font-family: var(--font-sans); font-size: 10px; font-weight: 700;
    border: none; padding: 4px 12px; border-radius: 3px; cursor: pointer;
    transition: opacity .15s;
}
.kustom-btn:hover { opacity: .82; }
.kustom-btn-apply  { background: #7c3aed; color: #fff; }
.kustom-btn-reset  { background: #2a1a3a; color: #9ab0cc; border: 1px solid #3a2a5a; }
.kustom-btn-copy   { background: #1a3a1a; color: #4ade80; border: 1px solid #2a5a2a; }
